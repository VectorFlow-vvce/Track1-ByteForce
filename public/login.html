<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareBand – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
      --border: rgba(255,255,255,0.07); --accent: #00d4aa; --accent2: #3b82f6;
      --danger: #ef4444; --text: #f1f5f9; --muted: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation: float2 10s ease-in-out infinite; }
    .orb-3 { width: 300px; height: 300px; background: #8b5cf6; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 12s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.1)} }

    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px; padding: 20px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
    }
    .auth-logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(43, 129, 112, 0.3);
    }
    .auth-logo h1 {
      font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
      color: var(--accent); letter-spacing: -0.5px;
    }
    .auth-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .auth-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: var(--muted); pointer-events: none;
    }
    .form-input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    .form-input::placeholder { color: var(--muted); }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 16px; color: var(--muted);
      background: none; border: none; padding: 0;
    }
    .toggle-pw:hover { color: var(--text); }

    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .remember-wrap input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .remember-wrap span { font-size: 13px; color: var(--muted); }
    .forgot-link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), #00b894);
      color: #000; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,212,170,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,212,170,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: 14px; color: var(--muted);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: var(--danger); border-radius: 10px; padding: 12px 14px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
      color: #10b981; border-radius: 10px; padding: 12px 14px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .success-msg.show { display: block; }

    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .demo-hint {
      background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 20px;
      font-size: 12px; color: #93c5fd;
    }
    .demo-hint strong { color: var(--accent2); }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🩺</div>
        <h1>CareBand</h1>
        <p>Dementia Care & Emergency System</p>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to your caregiver dashboard</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" class="form-input" id="email" placeholder="caregiver@hospital.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">👁️</button>
          </div>
        </div>

        <div class="form-row">
          <label class="remember-wrap">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="reset-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create account</a>
      </div>
    </div>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.classList.remove('show'); successMsg.classList.remove('show');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Signing in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Invalid email or password');
        localStorage.setItem('cb_token', data.token);
        localStorage.setItem('cb_user', JSON.stringify(data.user));
        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
    if (localStorage.getItem('cb_token')) { window.location.href = 'dashboard.html'; }
  </script>
</body>
</html>
